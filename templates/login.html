<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SmartAttend – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body class="login-body">

<div class="login-card">
  <div class="login-logo">
    <i class="bi bi-camera-video-fill"></i>
  </div>
  <h1 class="login-title">SmartAttend</h1>
  <p class="login-sub">Face Recognition Attendance System</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} py-2 small text-center">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" autocomplete="off">
    <div class="mb-3">
      <label class="form-label small fw-semibold">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" name="username" class="form-control"
               placeholder="admin" required autofocus>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label small fw-semibold">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="password" class="form-control"
               placeholder="••••••••" required>
      </div>
    </div>
    <button type="submit" class="btn-login-submit">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
    </button>
  </form>

  <div class="text-center mt-3">
    <a href="{{ url_for('forgot_password') }}"
       style="font-size:.85rem;color:#4f46e5;text-decoration:none;">
      <i class="bi bi-key me-1"></i>Forgot Password?
    </a>
  </div>

  <div class="login-hint">
    <a href="{{ url_for('self_register') }}" style="color:#4f46e5;text-decoration:none;font-weight:600;">
      <i class="bi bi-person-plus me-1"></i>Student? Register here
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
