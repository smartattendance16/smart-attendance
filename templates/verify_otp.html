<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SmartAttend – Verify OTP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
  <style>
    .otp-inputs { display:flex; gap:.5rem; justify-content:center; }
    .otp-inputs input {
      width: 48px; height: 56px;
      text-align: center; font-size: 1.5rem; font-weight: 700;
      border: 2px solid #e2e8f0; border-radius: 10px;
      color: #1e293b; outline: none;
      transition: border-color .2s;
    }
    .otp-inputs input:focus { border-color: #4f46e5; }
    #countdown { font-size: .85rem; color: #64748b; }
    #countdown span { font-weight: 700; color: #4f46e5; }
    #countdown.expired span { color: #dc2626; }
  </style>
</head>
<body class="login-body">
<div class="login-card">

  <!-- Step indicator -->
  <div class="d-flex justify-content-center gap-2 mb-4">
    <div class="d-flex align-items-center gap-1">
      <span style="width:28px;height:28px;border-radius:50%;background:#16a34a;color:#fff;
                   display:flex;align-items:center;justify-content:center;font-size:.8rem">
        <i class="bi bi-check"></i>
      </span>
      <span style="font-size:.8rem;color:#16a34a">Username</span>
    </div>
    <div style="height:2px;width:30px;background:#4f46e5;margin:auto"></div>
    <div class="d-flex align-items-center gap-1">
      <span style="width:28px;height:28px;border-radius:50%;background:#4f46e5;color:#fff;
                   display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700">2</span>
      <span style="font-size:.8rem;font-weight:600;color:#4f46e5">OTP</span>
    </div>
    <div style="height:2px;width:30px;background:#e2e8f0;margin:auto"></div>
    <div class="d-flex align-items-center gap-1">
      <span style="width:28px;height:28px;border-radius:50%;background:#e2e8f0;color:#94a3b8;
                   display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700">3</span>
      <span style="font-size:.8rem;color:#94a3b8">Reset</span>
    </div>
  </div>

  <div class="login-logo"><i class="bi bi-phone-fill"></i></div>
  <h1 class="login-title mt-2">Enter OTP</h1>
  <p class="login-sub">
    Check your terminal or email for the 6-digit OTP
    sent for <strong>{{ username }}</strong>.
  </p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} py-2 small text-center">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" id="otpForm">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <!-- 6 individual boxes -->
    <div class="otp-inputs mb-4" id="otpBoxes">
      <input type="text" maxlength="1" class="otp-box" inputmode="numeric" autofocus>
      <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
      <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
      <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
      <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
      <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
    </div>
    <!-- Hidden combined field -->
    <input type="hidden" name="otp" id="otpHidden">

    <div class="text-center mb-3" id="countdown">
      OTP expires in <span id="timer">10:00</span>
    </div>

    <button type="submit" class="btn-login-submit" id="submitBtn">
      <i class="bi bi-check-circle me-2"></i>Verify OTP
    </button>
  </form>

  <div class="text-center mt-3">
    <a href="{{ url_for('forgot_password') }}"
       style="font-size:.85rem;color:#64748b;text-decoration:none;">
      <i class="bi bi-arrow-clockwise me-1"></i>Resend OTP
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // OTP box auto-advance
  const boxes = document.querySelectorAll('.otp-box');
  boxes.forEach((box, i) => {
    box.addEventListener('input', () => {
      box.value = box.value.replace(/\D/g, '');
      if (box.value && i < boxes.length - 1) boxes[i + 1].focus();
    });
    box.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !box.value && i > 0) boxes[i - 1].focus();
    });
  });

  // Combine on submit
  document.getElementById('otpForm').addEventListener('submit', () => {
    document.getElementById('otpHidden').value =
      Array.from(boxes).map(b => b.value).join('');
  });

  // Countdown timer — 10 minutes
  let secs = 600;
  const timerEl = document.getElementById('timer');
  const countEl = document.getElementById('countdown');
  const interval = setInterval(() => {
    secs--;
    const m = String(Math.floor(secs / 60)).padStart(2, '0');
    const s = String(secs % 60).padStart(2, '0');
    timerEl.textContent = `${m}:${s}`;
    if (secs <= 0) {
      clearInterval(interval);
      timerEl.textContent = 'Expired';
      countEl.classList.add('expired');
      document.getElementById('submitBtn').disabled = true;
    }
  }, 1000);
</script>
</body>
</html>
