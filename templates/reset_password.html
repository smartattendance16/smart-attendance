<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SmartAttend – Reset Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body class="login-body">
<div class="login-card">

  <!-- Step indicator -->
  <div class="d-flex justify-content-center gap-2 mb-4">
    <div class="d-flex align-items-center gap-1">
      <span style="width:28px;height:28px;border-radius:50%;background:#16a34a;color:#fff;
                   display:flex;align-items:center;justify-content:center;font-size:.8rem">
        <i class="bi bi-check"></i>
      </span>
      <span style="font-size:.8rem;color:#16a34a">Username</span>
    </div>
    <div style="height:2px;width:30px;background:#16a34a;margin:auto"></div>
    <div class="d-flex align-items-center gap-1">
      <span style="width:28px;height:28px;border-radius:50%;background:#16a34a;color:#fff;
                   display:flex;align-items:center;justify-content:center;font-size:.8rem">
        <i class="bi bi-check"></i>
      </span>
      <span style="font-size:.8rem;color:#16a34a">OTP</span>
    </div>
    <div style="height:2px;width:30px;background:#4f46e5;margin:auto"></div>
    <div class="d-flex align-items-center gap-1">
      <span style="width:28px;height:28px;border-radius:50%;background:#4f46e5;color:#fff;
                   display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700">3</span>
      <span style="font-size:.8rem;font-weight:600;color:#4f46e5">Reset</span>
    </div>
  </div>

  <div class="login-logo"><i class="bi bi-lock-fill"></i></div>
  <h1 class="login-title mt-2">New Password</h1>
  <p class="login-sub">Set a new password for <strong>{{ username }}</strong>.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} py-2 small text-center">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label small fw-semibold">New Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="new_password" class="form-control"
               placeholder="Min. 6 characters" required id="pw1">
        <button class="btn btn-outline-secondary" type="button" onclick="togglePw('pw1',this)">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label small fw-semibold">Confirm Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        <input type="password" name="confirm_password" class="form-control"
               placeholder="Repeat password" required id="pw2">
        <button class="btn btn-outline-secondary" type="button" onclick="togglePw('pw2',this)">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>

    <!-- Password strength bar -->
    <div class="mb-4">
      <div class="progress" style="height:5px;">
        <div class="progress-bar" id="strengthBar" style="width:0%;transition:width .3s"></div>
      </div>
      <div id="strengthText" class="small mt-1 text-muted"></div>
    </div>

    <button type="submit" class="btn-login-submit">
      <i class="bi bi-check-circle me-2"></i>Reset Password
    </button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePw(id, btn) {
    const input = document.getElementById(id);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.innerHTML = isText ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
  }

  // Password strength
  document.getElementById('pw1').addEventListener('input', function () {
    const pw  = this.value;
    const bar = document.getElementById('strengthBar');
    const txt = document.getElementById('strengthText');
    let score = 0;
    if (pw.length >= 6)  score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    const levels = [
      { pct:'20%', cls:'bg-danger',  label:'Very Weak' },
      { pct:'40%', cls:'bg-warning', label:'Weak' },
      { pct:'60%', cls:'bg-info',    label:'Fair' },
      { pct:'80%', cls:'bg-primary', label:'Strong' },
      { pct:'100%',cls:'bg-success', label:'Very Strong' },
    ];
    const lv = levels[Math.max(0, score - 1)] || levels[0];
    bar.style.width = pw.length ? lv.pct : '0%';
    bar.className   = 'progress-bar ' + (pw.length ? lv.cls : '');
    txt.textContent = pw.length ? lv.label : '';
  });
</script>
</body>
</html>
