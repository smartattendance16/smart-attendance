<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SmartAttend – Forgot Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body class="login-body">
<div class="login-card">

  <!-- Step indicator -->
  <div class="d-flex justify-content-center gap-2 mb-4">
    <div class="d-flex align-items-center gap-1">
      <span style="width:28px;height:28px;border-radius:50%;background:#4f46e5;color:#fff;
                   display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700">1</span>
      <span style="font-size:.8rem;font-weight:600;color:#4f46e5">Username</span>
    </div>
    <div style="height:2px;width:30px;background:#e2e8f0;margin:auto"></div>
    <div class="d-flex align-items-center gap-1">
      <span style="width:28px;height:28px;border-radius:50%;background:#e2e8f0;color:#94a3b8;
                   display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700">2</span>
      <span style="font-size:.8rem;color:#94a3b8">OTP</span>
    </div>
    <div style="height:2px;width:30px;background:#e2e8f0;margin:auto"></div>
    <div class="d-flex align-items-center gap-1">
      <span style="width:28px;height:28px;border-radius:50%;background:#e2e8f0;color:#94a3b8;
                   display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700">3</span>
      <span style="font-size:.8rem;color:#94a3b8">Reset</span>
    </div>
  </div>

  <div class="login-logo"><i class="bi bi-shield-lock-fill"></i></div>
  <h1 class="login-title mt-2">Forgot Password</h1>
  <p class="login-sub">Enter your admin username to receive an OTP.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} py-2 small text-center">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="mb-4">
      <label class="form-label small fw-semibold">Admin Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" name="username" class="form-control"
               placeholder="e.g. admin" required autofocus>
      </div>
    </div>
    <button type="submit" class="btn-login-submit">
      <i class="bi bi-send me-2"></i>Send OTP
    </button>
  </form>

  <div class="text-center mt-3">
    <a href="{{ url_for('login') }}"
       style="font-size:.85rem;color:#64748b;text-decoration:none;">
      <i class="bi bi-arrow-left me-1"></i>Back to Login
    </a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
