{% extends 'base.html' %}
{% block title %}– Edit Student{% endblock %}
{% block page_title %}Edit Student{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="sa-card p-4">

      <div class="d-flex align-items-center gap-3 mb-4">
        <a href="{{ url_for('register') }}" class="btn btn-sm btn-outline-secondary">
          <i class="bi bi-arrow-left"></i>
        </a>
        <div>
          <h6 class="fw-semibold mb-0">
            <i class="bi bi-pencil-square text-primary me-2"></i>Edit Student
          </h6>
          <span class="text-muted small">Editing: {{ student.student_id }}</span>
        </div>
      </div>

      <form method="POST" class="loading-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="mb-3">
          <label class="form-label small fw-semibold">Student ID</label>
          <input type="text" class="form-control" value="{{ student.student_id }}" disabled
                 style="background:#f8fafc">
          <div class="form-text">Student ID cannot be changed.</div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-semibold">Full Name <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control"
                 value="{{ student.name }}" required>
        </div>

        <div class="row g-2 mb-3">
          <div class="col">
            <label class="form-label small fw-semibold">Department</label>
            <input type="text" name="department" class="form-control"
                   value="{{ student.department or '' }}">
          </div>
          <div class="col">
            <label class="form-label small fw-semibold">Phone</label>
            <input type="text" name="phone" class="form-control"
                   value="{{ student.phone or '' }}">
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-semibold">Email</label>
          <input type="email" name="email" class="form-control"
                 value="{{ student.email or '' }}">
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary flex-fill py-2 fw-semibold">
            <i class="bi bi-check-lg me-1"></i> Save Changes
          </button>
          <a href="{{ url_for('register') }}" class="btn btn-outline-secondary px-4 py-2">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
